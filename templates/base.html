<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concept Drift Monitor — NIFTY50</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-content">
            <h1 class="app-title">Concept Drift Monitor</h1>
            <div class="header-status">
                <span class="live-dot"></span>
                <small id="firebaseStatus">Connecting...</small>
                <small id="lastUpdated"></small>
            </div>
        </div>
    </header>

    <!-- Data Source Selector -->
    <div class="mode-selector">
        <div class="mode-buttons">
            <button id="modeToggleLive" class="mode-btn active" data-mode="live">
                <span class="mode-icon">🔴</span> LIVE
            </button>
            <button id="modeToggleSimulation" class="mode-btn" data-mode="simulation">
                <span class="mode-icon"></span> SIMULATION
            </button>
        </div>
    </div>

    <!-- Navigation Tabs -->
    <nav class="nav-tabs">
        <button class="nav-tab active" data-tab="live" data-modes="live">Live</button>
        <button class="nav-tab" data-tab="overview" data-modes="live,simulation">Overview</button>
        <button class="nav-tab" data-tab="accuracy" data-modes="live,simulation">Accuracy</button>
        <button class="nav-tab" data-tab="weights" data-modes="live,simulation">Weights</button>
        <button class="nav-tab" data-tab="nifty50" data-modes="simulation">NIFTY50</button>
        <button class="nav-tab" data-tab="mho" data-modes="simulation">MHO Council</button>
        <button class="nav-tab" data-tab="drift" data-modes="live,simulation">Drift Events</button>
        <button class="nav-tab" data-tab="models" data-modes="live,simulation">Model Registry</button>
    </nav>

    <!-- Tab Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Scripts - Modular Architecture -->
    <!-- Load in dependency order: no dependencies → high dependencies -->
    <script src="{{ url_for('static', filename='js/store.js') }}"></script>      <!-- Redux core: dispatch, subscribe, getState -->
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>        <!-- REST API calls -->
    <script src="{{ url_for('static', filename='js/firebase.js') }}"></script>    <!-- Real-time listeners (Firebase/REST) -->
    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>      <!-- Utility functions -->
    <script src="{{ url_for('static', filename='js/loaders.js') }}"></script>    <!-- Data orchestration (depends on API, Firebase, store) -->
    <script src="{{ url_for('static', filename='js/renderers.js') }}"></script>  <!-- UI rendering (depends on store, utils) -->
    <script src="{{ url_for('static', filename='js/handlers.js') }}"></script>   <!-- Event handlers (depends on loaders) -->
    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>     <!-- Chart helper functions -->
    <script src="{{ url_for('static', filename='js/live.js') }}"></script>       <!-- Entry point: orchestrates everything -->
    {% block scripts %}{% endblock %}
</body>
</html>
