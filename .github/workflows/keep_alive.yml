name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 3-5 * * 1-5'  # every 10 min, 08:30–10:30 IST

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Render
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_URL }}/health")
          echo "Render health status: $response"