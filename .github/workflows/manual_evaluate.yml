name: Manual Pending Evaluation

on:
  workflow_dispatch:
    inputs:
      n_predictions:
        description: 'Number of recent predictions to check'
        required: false
        default: '10'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check and wake Render if needed
        run: |
          echo "Checking if Render is up..."
          MAX_RETRIES=30
          WAIT_SECONDS=15
          count=0

          while [ $count -lt $MAX_RETRIES ]; do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 60 \
              --connect-timeout 10 \
              "${{ secrets.RENDER_URL }}/health" || true)

            echo "Attempt $((count+1)): HTTP $status"

            if [ "$status" = "200" ]; then
              echo "Render is up!"
              exit 0
            fi

            count=$((count+1))
            if [ $count -lt $MAX_RETRIES ]; then
              echo "Not ready yet. Waiting ${WAIT_SECONDS}s..."
              sleep $WAIT_SECONDS
            fi
          done

          echo "Render did not wake up after $MAX_RETRIES attempts"
          exit 1

      - name: Trigger manual pending evaluation
        run: |
          N_PREDS="${{ github.event.inputs.n_predictions || '10' }}"
          echo "Evaluating last $N_PREDS pending predictions..."
          
          HTTP_STATUS=$(curl -s -w "%{http_code}" -o response.txt \
            -X POST \
            -H "X-Cron-Token: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.RENDER_URL }}/run/evaluate_pending?n=$N_PREDS")
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response Body:"
          cat response.txt

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Evaluate pending job failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Pending evaluation job completed successfully"

      - name: Log result
        if: always()
        run: echo "Job ran at $(date -u)"
