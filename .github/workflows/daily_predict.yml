name: Daily NIFTY50 Prediction

on:
  schedule:
    - cron: '0 4 * * 1-5'    # 04:00 UTC = 09:30 IST, weekdays only
  workflow_dispatch:           # allows manual trigger from GitHub UI

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check and wake Render if needed
        run: |
          echo "Checking if Render is up..."
          MAX_RETRIES=8
          WAIT_SECONDS=15
          count=0

          until [ $count -ge $MAX_RETRIES ]; do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              "${{ secrets.RENDER_URL }}/health")

            echo "Attempt $((count+1)): HTTP $status"

            if [ "$status" = "200" ]; then
              echo "Render is up!"
              exit 0
            fi

            echo "Not ready yet. Waiting ${WAIT_SECONDS}s..."
            sleep $WAIT_SECONDS
            count=$((count+1))
          done

          echo "Render did not wake up after $MAX_RETRIES attempts"
          exit 1
      - name: Trigger daily prediction
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "X-Cron-Token: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.RENDER_URL }}/run/predict")
          echo "HTTP Status: $response"
          if [ "$response" != "200" ]; then
            echo "Prediction job failed with status $response"
            exit 1
          fi
          echo "Prediction job completed successfully"

      - name: Log result
        if: always()
        run: echo "Job ran at $(date -u)"
