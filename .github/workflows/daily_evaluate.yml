name: Daily NIFTY50 Evaluation

on:
  schedule:
    - cron: '5 4 * * 1-5'    # 04:05 UTC = 09:35 IST, weekdays only
  workflow_dispatch:           # allows manual trigger from GitHub UI

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check and wake Render if needed
        run: |
          echo "Checking if Render is up..."
          MAX_RETRIES=30
          WAIT_SECONDS=15
          count=0

          while [ $count -lt $MAX_RETRIES ]; do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 60 \
              --connect-timeout 10 \
              "${{ secrets.RENDER_URL }}/health" || true)

            echo "Attempt $((count+1)): HTTP $status"

            if [ "$status" = "200" ]; then
              echo "Render is up!"
              exit 0
            fi

            count=$((count+1))
            if [ $count -lt $MAX_RETRIES ]; then
              echo "Not ready yet. Waiting ${WAIT_SECONDS}s..."
              sleep $WAIT_SECONDS
            fi
          done

          echo "Render did not wake up after $MAX_RETRIES attempts"
          exit 1
      - name: Trigger daily evaluation
        run: |
          HTTP_STATUS=$(curl -s -w "%{http_code}" -o response.txt \
            -X POST \
            -H "X-Cron-Token: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.RENDER_URL }}/run/evaluate")
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response Body:"
          cat response.txt

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Evaluate job failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Evaluation job completed successfully"

      - name: Log result
        if: always()
        run: echo "Job ran at $(date -u)"
